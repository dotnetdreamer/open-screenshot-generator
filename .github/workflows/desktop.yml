name: Desktop builds (Tauri)

# Builds the downloadable installers: Windows (.msi + .exe), macOS (universal
# .dmg) and Linux (.AppImage + .deb).
# Triggered by a version tag (v1.2.3) or manually from the Actions tab.
# Tag pushes publish a public GitHub release with the installers attached;
# manual runs upload the installers as workflow-run artifacts instead, which is
# the way to smoke-test a build without cutting a release.
# The tag must match the version in src-tauri/tauri.conf.json (a guard
# step fails fast when it does not).
#
# NOTE: NEXT_PUBLIC_BASE_PATH must stay UNSET here. The GitHub Pages deploy
# (deploy.yml) builds under /artboard-studio; the desktop app is served from
# the bundle root, so a base path would 404 every asset.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
          # Pinned to 22.04 rather than ubuntu-latest: the AppImage links
          # against the builder's glibc, so building on the oldest supported
          # runner keeps it usable on older distros.
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Tauri v2 on Linux needs webkit2gtk 4.1 (4.0 is v1), and patchelf +
      # librsvg are what the AppImage bundler shells out to.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri-action substitutes __VERSION__ from tauri.conf.json, so a tag
      # pushed without bumping the config would publish under the wrong
      # version. Fail fast instead.
      - name: Check tag matches tauri.conf.json version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match tauri.conf.json version v${version}. Bump the config and re-tag."
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment once you have macOS signing set up (see docs/DESKTOP.md):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Only create a release when the run was triggered by a tag. Using
          # ref_name pins the release to the tag that triggered the run.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Artboard Studio {0}', github.ref_name) || '' }}
          # Published, not a draft: a tag push is the release. All three legs
          # append to the same release, so it stays live while the slower
          # platforms are still uploading.
          releaseDraft: false
          prerelease: false
          # The bundles are unsigned, so both OSes will warn on first launch.
          # Saying so here is cheaper than fielding the bug reports.
          releaseBody: |
            ## Download

            | Platform | File |
            | --- | --- |
            | Windows 10/11 | `.exe` (installer) or `.msi` |
            | macOS 10.15+ (Intel + Apple silicon) | `.dmg` |
            | Linux | `.AppImage` (portable) or `.deb` |

            These builds are not code-signed yet, so the first launch needs one extra click:

            - **Windows:** SmartScreen says "Windows protected your PC" -> More info -> Run anyway.
            - **macOS:** Gatekeeper says the app cannot be verified -> right-click the app -> Open -> Open.
            - **Linux:** `chmod +x` the AppImage before running it.

            Projects are stored locally in the app. Nothing is uploaded anywhere.
          args: ${{ matrix.args }}

      # tauri-action only uploads to a GitHub release; on manual runs (no
      # tag) attach the installers to the workflow run instead. The .app is
      # skipped on purpose: zip flattening breaks its symlinks, and the dmg
      # already contains it.
      - name: Upload installers as run artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
