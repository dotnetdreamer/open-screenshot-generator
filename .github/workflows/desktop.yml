name: Release desktop app (Tauri)

# Builds the downloadable installers: Windows (.msi + .exe + portable .zip),
# macOS (universal .dmg) and Linux (.AppImage + .deb).
#
# Manual only, on purpose. Nothing here fires on a push or a tag: you start a
# release from the Actions tab, and the run owns the version.
#
#   bump: patch (default) / minor / major   auto-increments from the current
#         version in src-tauri/tauri.conf.json
#   version: 1.2.0                          overrides the bump with an exact
#         version when you want to choose it yourself
#   dry_run: build the installers and attach them to the run as artifacts,
#         without bumping the version, tagging, or publishing a release
#
# A real run bumps the version across all four files that carry it, commits
# that to the default branch, tags it, and publishes a release with the
# installers attached.
#
# NOTE: NEXT_PUBLIC_BASE_PATH must stay UNSET here. The GitHub Pages deploy
# (deploy.yml) builds under /artboard-studio; the desktop app is served from
# the bundle root, so a base path would 404 every asset.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'How to increment the version (ignored if "version" is set)'
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: 'Exact version, e.g. 1.2.0. Leave empty to auto-increment.'
        type: string
        default: ''
      dry_run:
        description: 'Build only: no version bump, no tag, no release'
        type: boolean
        default: false

permissions:
  contents: write

# Two releases racing would bump the version off the same base and produce
# duplicate tags. Queue them instead.
concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  # Decides the version once, so the three build legs cannot disagree about it.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      # The build legs check out this sha: on a real run it is the version-bump
      # commit, so the binaries carry the released version rather than the old
      # one. On a dry run nothing was committed and it is just the trigger sha.
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version, commit and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          selector='${{ inputs.version || inputs.bump }}'

          # Resolve the version first, without writing anything: it is needed
          # for the duplicate-tag check below, and on a dry run that is all we
          # want.
          version=$(node scripts/set-version.mjs "$selector" --dry-run)

          if [ '${{ inputs.dry_run }}' = 'true' ]; then
            echo "Dry run: would release v${version}. Not bumping, tagging or publishing."
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # An existing tag means this version already shipped. Pushing it again
          # is a no-op, so the release would quietly attach to the old build.
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists. Pick a different version."
            exit 1
          fi

          node scripts/set-version.mjs "$selector"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "release: v${version}"
          git tag -a "v${version}" -m "Artboard Studio v${version}"

          # Branch and tag pushed separately and explicitly. --follow-tags would
          # skip the tag, since it only pushes annotated tags reachable from the
          # commits being pushed, and quietly leaving the tag behind would strand
          # the release.
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Releasing v${{ steps.bump.outputs.version }} (dry run = ${{ inputs.dry_run }})" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
          # Pinned to 22.04 rather than ubuntu-latest: the AppImage links
          # against the builder's glibc, so building on the oldest supported
          # runner keeps it usable on older distros.
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Tauri v2 on Linux needs webkit2gtk 4.1 (4.0 is v1), and patchelf +
      # librsvg are what the AppImage bundler shells out to.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows only: link the MSVC C runtime statically. The default
          # dynamic linkage makes the exe fail with "VCRUNTIME140.dll was not
          # found" on a clean Windows install without the VC++ redistributable,
          # which the portable zip has no installer to paper over. With this,
          # WebView2 really is the only runtime requirement, as the release
          # notes and the portable README claim.
          RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
          # Uncomment once you have macOS signing set up (see docs/DESKTOP.md):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Empty tagName means "build, do not release", which is what a dry
          # run wants. The version job already pushed this tag.
          #
          # The condition reads inverted on purpose. `a && b || c` in GitHub
          # expressions returns c whenever b is falsy, and '' is falsy, so the
          # natural `dry_run && '' || format(...)` would hand back the tag on a
          # dry run and publish exactly the release it was meant to suppress.
          # Keep the non-empty value in the `&&` slot.
          tagName: ${{ !inputs.dry_run && format('v{0}', needs.version.outputs.version) || '' }}
          releaseName: ${{ !inputs.dry_run && format('Artboard Studio v{0}', needs.version.outputs.version) || '' }}
          # Published, not a draft: all three legs append to the same release,
          # so it stays live while the slower platforms are still uploading.
          releaseDraft: false
          prerelease: false
          # The bundles are unsigned, so both OSes will warn on first launch.
          # Saying so here is cheaper than fielding the bug reports.
          releaseBody: |
            ## Download

            | Platform | File |
            | --- | --- |
            | Windows 10/11 | `.exe` (installer), `.msi`, or `_portable.zip` (no install) |
            | macOS 10.15+ (Intel + Apple silicon) | `.dmg` |
            | Linux | `.AppImage` (portable) or `.deb` |

            The portable Windows build is a single exe: unzip anywhere and run it. It needs the Microsoft Edge WebView2 Runtime, which is preinstalled on Windows 11 and on most Windows 10 systems. The installers set WebView2 up automatically; the portable build does not.

            These builds are not code-signed yet, so the first launch needs one extra click:

            - **Windows:** SmartScreen says "Windows protected your PC" -> More info -> Run anyway.
            - **macOS:** Gatekeeper says the app cannot be verified -> right-click the app -> Open -> Open.
            - **Linux:** `chmod +x` the AppImage before running it.

            Projects are stored locally in the app. Nothing is uploaded anywhere.
          args: ${{ matrix.args }}

      # The bare release exe already is the portable build: Tauri embeds the
      # whole frontend in the binary and this app bundles no resources or
      # sidecars, so nothing else needs to travel with it. tauri-action only
      # knows installer bundles, so zip it up here. Depending on the Tauri CLI
      # version the exe in target/release carries the product name or the
      # crate name; prefer the former, fall back to the latter.
      - name: Package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $release = 'src-tauri/target/release'
          $exe = @('Artboard Studio.exe', 'artboard-studio.exe') |
            ForEach-Object { Join-Path $release $_ } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Host "Executables in ${release}:"
            # SilentlyContinue: the runner sets $ErrorActionPreference = 'stop',
            # and a missing target/release would otherwise kill the script here,
            # before the actual error message below.
            Get-ChildItem $release -Filter *.exe -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            Write-Error 'Portable exe not found in target/release'
            exit 1
          }

          $stage = New-Item -ItemType Directory -Force -Path portable-stage
          Copy-Item $exe -Destination (Join-Path $stage 'Artboard Studio.exe')
          Set-Content -Path (Join-Path $stage 'README.txt') -Value @(
            'Artboard Studio (portable)',
            '',
            'No installation needed. Run "Artboard Studio.exe".',
            '',
            'Requires the Microsoft Edge WebView2 Runtime. It is preinstalled on',
            'Windows 11 and on most Windows 10 systems. If the app does not start,',
            'install it from:',
            'https://developer.microsoft.com/en-us/microsoft-edge/webview2/',
            '',
            'Your work is stored in your Windows user profile, not next to the',
            'exe, so it is kept across updates but does not travel with this zip:',
            'projects live in %LOCALAPPDATA%\com.ccrstech.artboardstudio and',
            'settings in %APPDATA%\com.ccrstech.artboardstudio.'
          )

          $zip = 'Artboard.Studio_${{ needs.version.outputs.version }}_x64_portable.zip'
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      # tauri-action already published the release from this same job, so the
      # tag exists by now. --clobber keeps a re-run of this leg from failing
      # on the existing asset.
      - name: Attach portable zip to the release
        if: matrix.platform == 'windows-latest' && !inputs.dry_run
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload 'v${{ needs.version.outputs.version }}' 'Artboard.Studio_${{ needs.version.outputs.version }}_x64_portable.zip' --clobber

      # tauri-action only uploads to a GitHub release, so a dry run would
      # otherwise leave nothing to inspect. The .app is skipped on purpose:
      # zip flattening breaks its symlinks, and the dmg already contains it.
      - name: Upload installers as run artifacts
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            Artboard.Studio_*_portable.zip
