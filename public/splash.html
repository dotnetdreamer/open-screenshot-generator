<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Artboard Studio</title>
    <style>
      /* Everything here is inline and self-hosted: the splash window has no
         network access on a cold offline start, and no Tauri IPC capability. */
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        /* Matches the window backgroundColor in tauri.conf.json, so the frame
           painted before the webview loads is the same color as the splash. */
        background: #457e80;
        background-image: radial-gradient(
          120% 120% at 30% 0%,
          #6fb3b5 0%,
          #457e80 55%,
          #2f5d5f 100%
        );
        color: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        cursor: default;
        user-select: none;
        -webkit-user-select: none;
      }

      .mark {
        width: 96px;
        height: 96px;
        animation: rise 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .wordmark {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
        animation: rise 520ms cubic-bezier(0.22, 1, 0.36, 1) 80ms both;
      }

      .tagline {
        margin-top: -10px;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.62);
        animation: rise 520ms cubic-bezier(0.22, 1, 0.36, 1) 140ms both;
      }

      .track {
        position: relative;
        width: 176px;
        height: 3px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.18);
        animation: rise 520ms cubic-bezier(0.22, 1, 0.36, 1) 200ms both;
      }

      .track::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 40%;
        border-radius: 999px;
        background: #d4af37;
        animation: sweep 1250ms ease-in-out infinite;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes sweep {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(250%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .mark,
        .wordmark,
        .tagline,
        .track {
          animation: none;
        }
        .track::after {
          width: 100%;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <svg
      class="mark"
      viewBox="0 0 512 512"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <rect
        x="118"
        y="72"
        width="188"
        height="328"
        rx="44"
        fill="none"
        stroke="#FFFFFF"
        stroke-opacity="0.4"
        stroke-width="26"
      />
      <rect
        x="206"
        y="112"
        width="188"
        height="328"
        rx="44"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="26"
      />
      <rect x="272" y="142" width="56" height="12" rx="6" fill="#FFFFFF" />
      <circle cx="262" cy="212" r="20" fill="#D4AF37" />
      <path
        d="M232 396 L282 318 L314 352 L352 300 L368 396 Z"
        fill="#FFFFFF"
        fill-opacity="0.9"
      />
      <g fill="#D4AF37">
        <rect x="184" y="90" width="44" height="44" rx="10" />
        <rect x="372" y="90" width="44" height="44" rx="10" />
        <rect x="184" y="418" width="44" height="44" rx="10" />
        <rect x="372" y="418" width="44" height="44" rx="10" />
      </g>
    </svg>

    <div class="wordmark">Artboard Studio</div>
    <div class="tagline">Loading your workspace</div>
    <div class="track" role="progressbar" aria-label="Loading"></div>
  </body>
</html>
